<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscar - Maquinaria PRO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style1.css">
</head>
<body class="bg-light">

    <header class="main-header sticky-top">
        <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
            <div class="container">
                <a class="navbar-brand logo" href="index.html">Maquinaria <strong>PRO</strong></a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="mainNav">
                    <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
                        <li class="nav-item"><a class="nav-link active" href="busca.html">Encontrar Serviços</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="py-5">
        <div class="container">
            <div class="row mb-4">
                <div class="col-12">
                    <h2 class="fw-bold">Resultados da Busca</h2>
                    <p class="text-muted" id="contador-resultados">Carregando resultados...</p>
                </div>
            </div>

            <div class="row g-4">
                <aside class="col-lg-3">
                    <div class="card border-0 shadow-sm p-4">
                        <h5 class="fw-bold mb-3">Filtros</h5>
                        <div class="mb-3">
                            <label class="form-label">O que procura?</label>
                            <select class="form-select" id="filtro-tipo" onchange="filtrarResultados()">
                                <option value="todos">Todos</option>
                                <option value="maquina">Máquinas</option>
                                <option value="operador">Operadores</option>
                            </select>
                        </div>
                    </div>
                </aside>

                <div class="col-lg-9">
                    <div class="row g-4" id="grid-busca">
                        </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        let todosOsItens = [];

        function carregarBusca() {
            // Pega os itens salvos no banco de dados local
            todosOsItens = JSON.parse(localStorage.getItem('maquinaria_itens')) || [];
            renderizarItens(todosOsItens);
        }

        function renderizarItens(itens) {
            const container = document.getElementById('grid-busca');
            const contador = document.getElementById('contador-resultados');
            
            container.innerHTML = ''; // Limpa antes de popular
            contador.innerText = `Mostrando ${itens.length} resultado(s)`;

            if (itens.length === 0) {
                container.innerHTML = '<div class="col-12"><p>Nenhum item encontrado.</p></div>';
                return;
            }

            itens.forEach(item => {
                const badge = item.tipo === 'operador' ? '<span class="badge bg-success mb-2 align-self-start">Operador</span>' : '';
                
                const cardHTML = `
                    <div class="col-md-6 col-xl-4">
                        <div class="card h-100 shadow-sm border-0">
                            <img src="${item.img}" class="card-img-top" alt="${item.titulo}" onerror="this.onerror=null; this.src='https://via.placeholder.com/300x200?text=Sem+Foto'">
                            <div class="card-body d-flex flex-column">
                                ${badge}
                                <h5 class="card-title fw-bold">${item.titulo}</h5>
                                <p class="card-text text-muted small mb-1">📍 ${item.local}</p>
                                <p class="card-text fs-5 mt-2 mb-3">A partir de <strong>R$ ${item.preco}</strong>/h</p>
                                <button class="btn btn-outline-primary mt-auto w-100">Contatar</button>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHTML;
            });
        }

        // Função simples de filtro
        function filtrarResultados() {
            const tipoSelecionado = document.getElementById('filtro-tipo').value;
            
            if (tipoSelecionado === 'todos') {
                renderizarItens(todosOsItens);
            } else {
                const filtrados = todosOsItens.filter(item => item.tipo === tipoSelecionado);
                renderizarItens(filtrados);
            }
        }

        // Executa ao carregar a página
        document.addEventListener('DOMContentLoaded', carregarBusca);
    </script>
</body>
</html>
